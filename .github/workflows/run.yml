name: 股票策略定时运行

on:
  workflow_dispatch:          # 只允许手动触发

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 恢复缓存（历史记录）
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-history-${{ github.run_id }}
          restore-keys: |
            stock-history-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 Python (候选模式)
        # 手动触发时运行
        run: python main.py candidates

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          full_commit_message: '更新策略看板'
