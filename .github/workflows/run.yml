name: 股票策略定时运行

on:
  workflow_dispatch:          # 允许手动触发

# ⚠️ 必须赋予 GitHub Actions 写入仓库的权限
permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 Python (候选模式)
        run: python main.py candidates
        timeout-minutes: 120

      # --- 🌟 核心修改：将生成的文件直接 Commit 并 Push 回你的 GitHub 仓库 ---
      - name: 提交生成的报告和数据回仓库
        run: |
          # 配置机器人身份
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 将 Python 刚刚生成或更新的文件添加到暂存区
          # 如果你有其他生成的文件，也可以加在后面
          git add index.html daily_candidates.json left_history.json right_history.json
          
          # 提交并推送到当前分支 (如果没有文件变化则忽略报错)
          git commit -m "🤖 Auto-update: 每日量化选股报告与历史数据" || echo "No changes to commit"
          git push

      # --- (可选) 如果你还想把文件打包成压缩包提供下载，把这里的注释解开 ---
      - name: 上传生成的文件作为附件
        uses: actions/upload-artifact@v4
        with:
          name: 股票量化报告-产出物
          path: |
            index.html
            daily_candidates.json
          retention-days: 5
