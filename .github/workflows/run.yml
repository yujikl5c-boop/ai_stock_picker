name: 股票策略定时运行

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    - cron: '25 6 * * 1-5'  # 北京时间 14:25 (自动执行选股+更新历史)
    - cron: '15 7 * * 1-5'  # 北京时间 15:15 (只更新历史池收盘价)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 4. 运行主程序 (自动模式)
        # 传入 auto 参数，Python 会看表自动决定干啥
        run: python -u main.py candidates
        timeout-minutes: 120

      - name: 5. 提交代码回仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git status
          git commit -m "🤖 Auto-update: 每日量化选股报告与历史数据更新" || echo "没有文件变动"
          git push

      - name: 6. 准备部署网页
        uses: actions/configure-pages@v5
        
      - name: 7. 打包网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: 8. 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
