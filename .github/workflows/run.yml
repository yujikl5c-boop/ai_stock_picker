name: 股票策略定时运行

on:
  schedule:
    - cron: '25 6 * * 1-5'   # 北京时间 14:25 (UTC 6:25)
    - cron: '15 7 * * 1-5'   # 北京时间 15:15 (UTC 7:15)
  workflow_dispatch:          # 允许手动触发

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 恢复缓存（历史记录）
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-history-${{ github.run_id }}
          restore-keys: |
            stock-history-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 获取当前 UTC 小时和分钟
        id: time
        run: |
          echo "hour=$(date -u +%H)" >> $GITHUB_ENV
          echo "minute=$(date -u +%M)" >> $GITHUB_ENV

      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ env.hour }}" == "06" ] && [ "${{ env.minute }}" == "25" ]; then
            echo "mode=candidates" >> $GITHUB_ENV
          elif [ "${{ env.hour }}" == "07" ] && [ "${{ env.minute }}" == "15" ]; then
            echo "mode=history" >> $GITHUB_ENV
          else
            echo "mode=manual" >> $GITHUB_ENV
          fi

      - name: 运行 Python (候选模式)
        if: env.mode == 'candidates' || env.mode == 'manual'
        timeout-minutes: 20
        run: python main.py candidates

      - name: 运行 Python (历史模式)
        if: env.mode == 'history'   # 只有定时任务时才会运行，手动触发不运行
        timeout-minutes: 10
        run: python main.py history

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          full_commit_message: '更新策略看板'
