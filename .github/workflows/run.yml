name: 股票策略定时运行

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    - cron: '30 7 * * 1-5'  # 每天北京时间 15:30 自动跑一次 (UTC 7:30)

permissions:
  contents: write
  pages: write            # 🌟 新增：允许 Actions 把网页推送到 Pages 服务器
  id-token: write         # 🌟 新增：用于 Pages 部署的安全认证

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载仓库代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 安装量化所需依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 4. 运行主程序 (生成看板与数据)
        run: python -u main.py candidates
        timeout-minutes: 120

      - name: 5. 将生成的报告和数据提交回仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git status
          git commit -m "🤖 Auto-update: 每日量化选股报告与历史数据更新" || echo "没有文件变动"
          git push

      # ====================================================
      # 🌟 新增：将刚刚更新的仓库代码部署到 GitHub Pages
      # ====================================================
      - name: 6. 准备部署网页
        uses: actions/configure-pages@v5
        
      - name: 7. 打包网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          # 打包当前目录下的所有内容（包含你刚刚生成的 index.html）
          path: '.'
          
      - name: 8. 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
