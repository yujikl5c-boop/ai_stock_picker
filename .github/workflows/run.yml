name: 股票策略定时运行

on:
  workflow_dispatch:          # 允许手动触发
  # schedule:
  #   - cron: '30 7 * * 1-5'  # 如果你想将来每天自动跑，可以把这两行注释解开 (这是 UTC 时间，对应北京时间 15:30)

# 赋予 Action 机器人推送到仓库的写权限
permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载仓库代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 安装量化所需依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 4. 运行主程序 (生成看板与数据)
        run: python main.py candidates
        timeout-minutes: 120

      - name: 5. 将生成的报告和数据提交回仓库
        run: |
          # 配置机器人身份
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 暴力添加所有生成/修改的文件 (包含 index.html, json 历史记录等)
          git add -A
          
          # 打印状态以便查错
          git status
          
          # 提交并推送
          git commit -m "🤖 Auto-update: 每日量化选股报告与历史数据更新" || echo "没有文件变动"
          git push
