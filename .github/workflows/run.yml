name: 股票策略定时运行

on:
  workflow_dispatch:          # 只允许手动触发

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 恢复缓存（历史记录）
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-cache-${{ github.run_id }}
          restore-keys: |
            stock-cache-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 Python (候选模式)
        run: python main.py candidates
        timeout-minutes: 120

      # --- 这些步骤会在 main.py 成功后执行 ---
      # 保存本次运行生成的文件到缓存，供下次运行使用
      - name: 保存文件到缓存
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-cache-${{ github.run_id }}
          # 注意：这里没有 save-only: true，因为它会覆盖 restore 步骤的行为
          # 我们需要先恢复，再让脚本更新文件，最后再保存
        # cache 会在 job 结束时自动保存最新的文件
        
      # 如果你想把生成的文件打包下载下来查看，可以启用下面的步骤
      # - name: 上传生成的文件
      #   uses: actions/upload-artifact@v4
