name: 股票策略定时运行

on:
  workflow_dispatch:          # 只允许手动触发

# ⚠️ 这一步极其重要：必须赋予 GitHub Actions 写入代码仓库的权限
permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 Python (候选模式)
        run: python main.py candidates
        timeout-minutes: 120

      # --- 🌟 核心修改：将生成的文件直接 Commit 并 Push 回你的 GitHub 仓库 ---
      - name: 提交生成的报告和数据回仓库
        run: |
          # 配置 GitHub 官方机器人身份
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 将刚刚生成的所有文件添加到暂存区
          git add index.html daily_candidates.json left_history.json right_history.json
          
          # 提交并推送到当前分支 (如果没有文件更新，就跳过不报错)
          git commit -m "🤖 Auto-update: 每日量化选股报告与历史数据" || echo "No changes to commit"
          git push
