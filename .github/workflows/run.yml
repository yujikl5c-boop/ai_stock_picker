name: 极简推送测试

on:
  workflow_dispatch: # 允许手动触发

# ⚠️ 必须给！赋予 Action 机器人推送到仓库的写权限
permissions:
  contents: write

jobs:
  test-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 运行 Python 脚本生成文件
        run: python main.py

      - name: 3. 将生成的文件提交回仓库
        run: |
          # 配置机器人身份
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 强制把刚生成的 test_output.txt 加进暂存区
          git add test_output.txt
          
          # 打印一下状态，方便在日志里查错
          git status
          
          # 提交并推送
          git commit -m "🤖 极简测试：自动推送生成的文件" || echo "没有文件变动"
          git push
