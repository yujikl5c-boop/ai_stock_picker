name: 股票策略定时运行

on:
  workflow_dispatch:          # 只允许手动触发

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 恢复缓存（历史记录和最优IP缓存）
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-cache-${{ github.run_id }}
          restore-keys: |
            stock-cache-

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 Python (候选模式)
        run: python main.py candidates
        timeout-minutes: 120

      # --- 将 Post 步骤改为普通的 steps ---
      - name: 保存历史记录和候选数据到缓存
        uses: actions/cache@v4
        with:
          path: |
            left_history.json
            right_history.json
            daily_candidates.json
          key: stock-cache-${{ github.run_id }}
          save-only: true  # 只保存，不恢复

      - name: 下载代码
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: ./generated
